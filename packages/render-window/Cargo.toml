[package]
name = "render-window"
version = "0.1.0"
edition = "2024"
description = "DreamForge native Tauri + wgpu render-window package"
license = "MIT"

[build-dependencies]
tauri-build = "2.6.3"

[dependencies]
gaia-core = { path = "../../crates/gaia-core" }
png = "0.17.16"
pollster = "0.4.0"
raw-window-handle = "0.6.2"
tauri = { version = "2.11.5", features = ["macos-private-api", "unstable"] }
wgpu = "30.0.0"

[target.'cfg(target_os = "macos")'.dependencies]
block2 = "0.6.2"
objc2-app-kit = { version = "0.3.2", features = ["NSEvent", "NSWindow"] }
